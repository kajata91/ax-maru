<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AX-Maru — Daily Intelligence</title>
<style>
  :root {
    --glass: rgba(255,255,255,.045);
    --glass-2: rgba(255,255,255,.07);
    --glass-3: rgba(255,255,255,.10);
    --stroke: rgba(255,255,255,.09);
    --stroke-2: rgba(255,255,255,.16);
    --text: #f0f2f7;
    --dim: #9aa0b0;
    --faint: #5f6575;
    --cyan: #38e1ff;
    --violet: #a78bfa;
    --blue: #4c7dff;
    --high: #ff5d5d;
    --mid: #ffb950;
    --low: #8d93a3;
    --c-tech: #a78bfa;
    --c-case: #4c7dff;
    --c-paper: #2dd4bf;
    --c-policy: #f59e0b;
    --c-hr: #f472b6;
    --c-concept: #34d399;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif;
    color: var(--text);
    background: #030407;
    overflow: hidden;
  }
  /* 배경 글로우 */
  .bg-glow { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .bg-glow::before, .bg-glow::after {
    content:""; position:absolute; border-radius:50%; filter: blur(120px); opacity:.35;
  }
  .bg-glow::before { width:55vw; height:55vw; background:#1b2a6e; top:-18vw; right:-12vw; }
  .bg-glow::after { width:45vw; height:45vw; background:#3b1d6e; bottom:-15vw; left:-10vw; }

  /* 외곽 프레임 (Hourglass의 둥근 패널 느낌) */
  .frame {
    position: relative; z-index: 1;
    height: calc(100% - 28px); margin: 14px;
    background: rgba(10,12,18,.55);
    border: 1px solid var(--stroke);
    border-radius: 26px;
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    display: flex; overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
  }

  /* ── 좌측 네비 ── */
  .sidebar {
    width: 196px; flex-shrink: 0;
    padding: 24px 14px;
    border-right: 1px solid var(--stroke);
    display: flex; flex-direction: column; gap: 4px;
  }
  .brand { display:flex; align-items:center; gap:10px; padding:0 8px 24px; }
  .brand-logo {
    width:36px; height:36px; border-radius:11px;
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:14px; color:#06070c;
  }
  .brand-name { font-weight:800; font-size:15.5px; letter-spacing:-.3px; }
  .brand-sub { font-size:9.5px; color:var(--faint); letter-spacing:1.2px; }
  .nav-item {
    display:flex; align-items:center; gap:11px;
    padding: 10px 12px; border-radius: 12px;
    font-size: 13px; font-weight: 600; color: var(--dim);
    cursor: pointer; border: 1px solid transparent;
    background: none; width: 100%; text-align: left;
    transition: all .18s;
  }
  .nav-item:hover { background: var(--glass); color: var(--text); }
  .nav-item.active {
    background: var(--glass-2); color: var(--text);
    border-color: var(--stroke-2);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
  }
  .nav-foot { margin-top:auto; padding: 12px 8px 0; font-size: 10.5px; color: var(--faint); line-height: 1.6; }

  /* ── 중앙 ── */
  .center { flex: 1; min-width: 0; overflow-y: auto; padding: 26px 30px 50px; }
  .welcome-row { display:flex; align-items:flex-end; gap:14px; margin-bottom: 18px; }
  .welcome { font-size: 30px; font-weight: 800; letter-spacing: -0.8px; }
  .welcome-date { font-size: 13px; color: var(--dim); padding-bottom: 5px; }
  .btn-open {
    margin-left:auto;
    background: var(--glass-2); color: var(--text);
    border: 1px solid var(--stroke-2); border-radius: 11px;
    padding: 9px 16px; font-size: 12.5px; font-weight: 700; cursor: pointer;
    backdrop-filter: blur(10px); transition: all .18s;
  }
  .btn-open:hover { background: var(--glass-3); }

  /* ── 히어로 (미래형 AI 비주얼 + Top Story) ── */
  .hero {
    position: relative; border-radius: 22px; overflow: hidden;
    border: 1px solid var(--stroke-2);
    min-height: 270px;
    background: linear-gradient(135deg, rgba(56,225,255,.07), rgba(167,139,250,.09) 60%, rgba(76,125,255,.06));
    cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
  }
  .hero svg.neural { position:absolute; inset:0; width:100%; height:100%; }
  .hero-overlay {
    position: relative; z-index: 2;
    padding: 26px 30px;
    height: 100%; display: flex; flex-direction: column;
    background: linear-gradient(100deg, rgba(5,6,10,.82) 30%, rgba(5,6,10,.35) 60%, transparent);
  }
  .hero-kicker { display:flex; align-items:center; gap:10px; margin-bottom: 12px; }
  .hero-badge {
    font-size:10px; font-weight:800; letter-spacing:1px;
    background: linear-gradient(90deg, var(--cyan), var(--violet));
    color:#06070c; padding:4px 11px; border-radius:7px;
  }
  .hero-cat { font-size: 12px; color: var(--dim); font-weight: 600; }
  .hero-title { font-size: 22px; font-weight: 800; line-height: 1.4; letter-spacing: -0.5px; max-width: 600px; margin-bottom: 10px; }
  .hero-why { font-size: 13px; color: #c8d2ea; line-height: 1.7; max-width: 580px; }
  .hero-bar {
    margin-top: auto; align-self: flex-start;
    display: flex; align-items: center; gap: 14px;
    background: rgba(8,10,16,.65);
    border: 1px solid var(--stroke-2);
    backdrop-filter: blur(14px);
    border-radius: 13px; padding: 10px 16px;
    font-size: 12px; color: var(--dim); margin-top: 18px;
  }
  .hero-bar b { color: var(--text); font-weight: 700; }
  .hero-bar a { color: var(--cyan); font-weight: 700; text-decoration: none; }
  .hero-bar a:hover { text-decoration: underline; }

  /* ── 카테고리 아이콘 행 ── */
  .cat-row { display: flex; gap: 10px; margin: 22px 0 24px; flex-wrap: wrap; }
  .cat-btn {
    flex: 1; min-width: 96px;
    background: var(--glass); border: 1px solid var(--stroke);
    border-radius: 16px; padding: 14px 8px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; transition: all .18s;
    backdrop-filter: blur(10px);
  }
  .cat-btn:hover { background: var(--glass-2); transform: translateY(-2px); }
  .cat-btn.active { background: var(--glass-2); border-color: var(--stroke-2); box-shadow: inset 0 1px 0 rgba(255,255,255,.09), 0 8px 24px rgba(0,0,0,.35); }
  .cat-ic {
    width: 40px; height: 40px; border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    border: 1px solid var(--stroke-2);
    background: var(--glass-2);
  }
  .cat-btn.active .cat-ic { box-shadow: 0 0 18px -2px var(--glow, transparent); }
  .cat-name { font-size: 11px; font-weight: 700; color: var(--dim); text-align: center; line-height: 1.3; }
  .cat-btn.active .cat-name { color: var(--text); }
  .cat-cnt { font-size: 10px; color: var(--faint); font-weight: 700; }

  /* ── 피드 ── */
  .feed-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .feed-title { font-size: 17px; font-weight: 800; letter-spacing: -.3px; }
  .feed-sub { font-size: 12px; color: var(--faint); }
  .imp-tabs { margin-left: auto; display: flex; gap: 4px; background: var(--glass); border: 1px solid var(--stroke); border-radius: 10px; padding: 3px; }
  .imp-tab { border: none; background: transparent; color: var(--dim); font-size: 11.5px; font-weight: 700; padding: 5px 12px; border-radius: 8px; cursor: pointer; }
  .imp-tab.active { background: var(--glass-3); color: var(--text); }

  .item {
    background: var(--glass); border: 1px solid var(--stroke);
    border-radius: 16px; padding: 16px 18px; margin-top: 10px;
    cursor: pointer; transition: all .18s;
    backdrop-filter: blur(10px);
  }
  .item:hover { background: var(--glass-2); }
  .item-row { display: flex; gap: 12px; align-items: flex-start; }
  .imp-pill { flex-shrink:0; margin-top:2px; font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:7px; border:1px solid transparent; }
  .imp-상 { color:var(--high); background:rgba(255,93,93,.10); border-color:rgba(255,93,93,.25); }
  .imp-중 { color:var(--mid); background:rgba(255,185,80,.10); border-color:rgba(255,185,80,.22); }
  .imp-하 { color:var(--low); background:rgba(141,147,163,.10); border-color:rgba(141,147,163,.22); }
  .item-body { flex: 1; min-width: 0; }
  .item-title { font-size: 14px; font-weight: 700; line-height: 1.5; letter-spacing: -.2px; }
  .read-time { font-size: 11px; color: var(--faint); font-weight: 600; margin-left: 6px; white-space: nowrap; }
  .item-meta { display:flex; align-items:center; gap:8px; margin-top:7px; font-size:11.5px; color:var(--faint); flex-wrap:wrap; }
  .src-badge { background: var(--glass-2); border:1px solid var(--stroke); padding:2px 9px; border-radius:7px; font-weight:600; color:var(--dim); }
  .multi-src { color: var(--c-paper); font-weight: 700; }
  .tier1 { color: var(--c-concept); font-weight: 700; }
  .chev { color: var(--faint); font-size: 10px; flex-shrink:0; margin-top:6px; transition: transform .2s; }
  .item.open .chev { transform: rotate(90deg); }
  .item-detail { display: none; margin-top: 13px; }
  .item.open .item-detail { display: block; }
  .item-summary { font-size: 13px; color: var(--dim); line-height: 1.75; margin-bottom: 11px; }
  .why-box {
    background: rgba(56,225,255,.05);
    border: 1px solid rgba(56,225,255,.15);
    border-left: 3px solid var(--cyan);
    border-radius: 0 11px 11px 0; padding: 11px 14px;
  }
  .why-label { font-size: 10.5px; font-weight: 800; color: var(--cyan); letter-spacing: .8px; margin-bottom: 5px; }
  .why-text { font-size: 12.5px; color: #c8d2ea; line-height: 1.7; }
  .item-link { display:inline-block; margin-top:11px; color:var(--cyan); font-size:12.5px; font-weight:700; text-decoration:none; }
  .item-link:hover { text-decoration: underline; }
  .empty-msg { color: var(--faint); font-size: 13px; text-align: center; padding: 40px 0; }

  /* ── 우측 패널 ── */
  .right {
    width: 296px; flex-shrink: 0;
    border-left: 1px solid var(--stroke);
    padding: 26px 20px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 24px;
  }
  .rp-title { font-size: 17px; font-weight: 800; letter-spacing: -.3px; margin-bottom: 14px; }
  .search-input {
    width: 100%;
    background: var(--glass-2); border: 1px solid var(--stroke-2);
    border-radius: 12px; padding: 11px 15px;
    color: var(--text); font-size: 13px; outline: none;
    backdrop-filter: blur(10px);
  }
  .search-input::placeholder { color: var(--faint); }
  .kw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 14px; }
  .kw-tile {
    background: var(--glass); border: 1px solid var(--stroke);
    border-radius: 14px; padding: 13px 12px;
    display: flex; flex-direction: column; gap: 7px;
    cursor: pointer; transition: all .18s;
  }
  .kw-tile:hover { background: var(--glass-2); border-color: var(--stroke-2); }
  .kw-ic { font-size: 16px; }
  .kw-name { font-size: 11.5px; font-weight: 700; color: var(--dim); line-height: 1.4; }
  .kw-tile:hover .kw-name { color: var(--text); }
  .stat-mini { display: flex; gap: 9px; }
  .stat-box {
    flex: 1; background: var(--glass); border: 1px solid var(--stroke);
    border-radius: 13px; padding: 11px; text-align: center;
  }
  .stat-num { font-size: 19px; font-weight: 800; }
  .stat-cap { font-size: 10px; color: var(--faint); margin-top: 2px; }

  .queue-card {
    background: var(--glass); border: 1px solid var(--stroke);
    border-radius: 15px; padding: 13px 14px; margin-top: 9px;
    cursor: pointer; transition: all .18s;
  }
  .queue-card:hover { background: var(--glass-2); border-color: var(--stroke-2); }
  .q-top { display:flex; align-items:center; gap:8px; margin-bottom: 7px; }
  .q-rank {
    width: 22px; height: 22px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    color: #06070c; font-size: 11px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .q-cat { font-size: 10.5px; font-weight: 700; }
  .q-title { font-size: 12.5px; font-weight: 700; line-height: 1.5; }
  .q-meta { font-size: 10.5px; color: var(--faint); margin-top: 5px; }

  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-thumb { background: var(--stroke-2); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* 네트워크 애니메이션 */
  @keyframes dash { to { stroke-dashoffset: -60; } }
  @keyframes pulse { 0%,100% { opacity:.55; r:3.2; } 50% { opacity:1; r:4.6; } }
  .neural .link { stroke-dasharray: 6 6; animation: dash 3.2s linear infinite; }
  .neural .node { animation: pulse 2.6s ease-in-out infinite; }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="frame">

  <!-- 좌측 네비 -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">AX</div>
      <div>
        <div class="brand-name">AX-Maru</div>
        <div class="brand-sub">INTELLIGENCE</div>
      </div>
    </div>
    <button class="nav-item active">▦&nbsp; Dashboard</button>
    <button class="nav-item" onclick="document.getElementById('fileInput').click()">🗂&nbsp; 다이제스트 열기</button>
    <button class="nav-item" onclick="alert('Archive는 2단계에서 제공 예정입니다.')">🕘&nbsp; Archive</button>
    <button class="nav-item" onclick="alert('Settings는 2단계에서 제공 예정입니다.')">⚙&nbsp; Settings</button>
    <div class="nav-foot">v0.3 · 정의서 v0.2 기준<br>매일 08:00 KST 갱신 목표</div>
  </aside>

  <!-- 중앙 -->
  <main class="center">
    <div class="welcome-row">
      <div class="welcome">Today's Brief</div>
      <div class="welcome-date" id="dateLabel"></div>
      <button class="btn-open" onclick="document.getElementById('fileInput').click()">＋ 다이제스트 열기</button>
      <input type="file" id="fileInput" accept=".md" style="display:none" onchange="loadFile(this)">
    </div>

    <!-- 히어로 -->
    <div class="hero" id="hero"></div>

    <!-- 카테고리 아이콘 행 -->
    <div class="cat-row" id="catRow"></div>

    <!-- 피드 -->
    <div class="feed-head">
      <span class="feed-title" id="feedTitle">전체</span>
      <span class="feed-sub" id="feedSub"></span>
      <div class="imp-tabs">
        <button class="imp-tab active" data-imp="all" onclick="setImp(this)">전체</button>
        <button class="imp-tab" data-imp="상" onclick="setImp(this)">상</button>
        <button class="imp-tab" data-imp="중" onclick="setImp(this)">중</button>
        <button class="imp-tab" data-imp="하" onclick="setImp(this)">하</button>
      </div>
    </div>
    <div id="feed"></div>
  </main>

  <!-- 우측 패널 -->
  <aside class="right">
    <div>
      <div class="rp-title">Explore</div>
      <input class="search-input" id="searchInput" placeholder="검색…" oninput="render()">
      <div class="kw-grid" id="kwGrid"></div>
    </div>
    <div>
      <div class="stat-mini">
        <div class="stat-box"><div class="stat-num" id="mTotal">0</div><div class="stat-cap">오늘 총 건수</div></div>
        <div class="stat-box"><div class="stat-num" id="mHigh" style="color:var(--high)">0</div><div class="stat-cap">중요도 상</div></div>
        <div class="stat-box"><div class="stat-num" id="mTier1" style="color:var(--c-concept)">0</div><div class="stat-cap">Tier-1</div></div>
      </div>
    </div>
    <div>
      <div class="rp-title">Editor's Top 3</div>
      <div id="top3"></div>
    </div>
  </aside>
</div>

<script>
// ───────────── 분야 정의 (정의서 v0.2) ─────────────
const CATEGORIES = [
  { key:"all",     label:"전체",            icon:"✦",  color:"var(--cyan)" },
  { key:"tech",    label:"빅테크 모델·기술", icon:"⚡", color:"var(--c-tech)",    match:["빅테크"] },
  { key:"case",    label:"AX 도입 사례",     icon:"🏢", color:"var(--c-case)",    match:["AX 도입","사례","방법론"] },
  { key:"paper",   label:"논문·연구",        icon:"🔬", color:"var(--c-paper)",   match:["논문","연구"] },
  { key:"policy",  label:"규제·정책",        icon:"⚖️", color:"var(--c-policy)",  match:["규제","정책"] },
  { key:"hr",      label:"일·조직·HR",       icon:"👥", color:"var(--c-hr)",      match:["HR","조직"] },
  { key:"concept", label:"신개념·도서",      icon:"💡", color:"var(--c-concept)", match:["신개념","참고"] },
];
const KW_ICONS = ["🤖","📈","🏭","🛡️","🧭","🔭","🧩","🌐"];
const TIER1 = ["OpenAI","Anthropic","Google","DeepMind","arXiv","MIT","Harvard","Stanford","FT","Financial Times","Bloomberg","Reuters","Bersin","ATD","SHRM","McKinsey","BCG","Deloitte","European Commission","npj","CMU","SEI"];

// ───────────── 데이터: 2026-06-12 (내장) ─────────────
let DATA = {
  date: "2026-06-12 (금)",
  keywords: ["에이전틱 AI","AI 기업 IPO 러시","전사 AX(삼성전자)","AI 콘텐츠 표시 규제(EU)","HR 2030·조직 재설계"],
  items: [
    { imp:"상", cat:"tech", title:"Anthropic, Claude Fable 5 일반 공개 — Mythos급 모델의 대중화",
      summary:"Anthropic이 6월 9일 'Claude Fable 5'를 일반 공개했습니다. 두 달 전 제한 공개로 시장에 충격을 줬던 Mythos급 모델과 동일 기반으로, 고위험 영역 응답을 차단하는 신규 세이프가드를 적용해 일반 제공이 가능해졌습니다. 코딩·지식노동·비전·메모리·장문 컨텍스트 성능이 강화됐고, 최근 기업가치 9,650억 달러로 펀딩을 마감했으며 IPO 신고서도 비공개 제출한 상태입니다.",
      insight:"최상위 모델의 '일반 제공'은 기업 AX의 가용 역량 상한이 한 단계 올라갔다는 뜻입니다. 지식노동 자동화 범위 재평가와 함께, 고성능 모델 도입 시 안전·보안 거버넌스를 같이 설계해야 한다는 신호입니다.",
      source:"CNBC · Anthropic", srcCount:2, date:"06-09", url:"https://www.cnbc.com/2026/06/09/anthropic-mythos-claude-fable-5.html" },
    { imp:"중", cat:"tech", title:"OpenAI, 에이전트 클라우드 스타트업 Ona 인수 — \"몇 시간~며칠짜리 일을 위임\"",
      summary:"6월 11일 발표(금액 비공개). Ona 기술로 Codex가 단일 기기·세션에 묶이지 않고 수 시간~수일짜리 장기 작업을 수행할 수 있게 됩니다. Codex 주간 활성 사용자는 4월 300만 명에서 500만 명 이상으로 증가했습니다.",
      insight:"'짧은 보조'에서 '장기 위임'으로 에이전트 사용 패턴이 이동 중입니다. 위임 가능한 작업 단위 정의, 산출물 검수 체계, 책임 소재 규정이 조직의 새 과제가 됩니다.",

// ───────────── 상태 ─────────────
let catFilter = "all";
let impFilter = "all";

function setImp(btn) {
  document.querySelectorAll(".imp-tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  impFilter = btn.dataset.imp;
  render();
}
function setCat(key) { catFilter = key; render(); }
function readTime(it) { return Math.max(1, Math.round((it.summary + it.insight).length / 350)) + "분"; }
function isTier1(src) { return TIER1.some(t => src.includes(t)); }

// ───────────── 미래형 신경망 SVG ─────────────
function neuralSVG() {
  const W = 900, H = 300;
  let nodes = [], links = "";
  // 의사난수로 노드 배치 (오른쪽에 집중)
  let seed = 7;
  const rnd = () => (seed = (seed * 16807) % 2147483647) / 2147483647;
  for (let i = 0; i < 26; i++) {
    nodes.push({ x: W * (0.35 + rnd() * 0.62), y: H * (0.08 + rnd() * 0.84) });
  }
  let circles = "";
  nodes.forEach((n, i) => {
    nodes.forEach((m, j) => {
      if (j > i && Math.hypot(n.x - m.x, n.y - m.y) < 130) {
        links += `<line class="link" x1="${n.x.toFixed(0)}" y1="${n.y.toFixed(0)}" x2="${m.x.toFixed(0)}" y2="${m.y.toFixed(0)}" stroke="url(#lg)" stroke-width="1" opacity="0.5" style="animation-delay:${(i*0.21)%3}s"/>`;
      }
    });
    circles += `<circle class="node" cx="${n.x.toFixed(0)}" cy="${n.y.toFixed(0)}" r="3.2" fill="${i%3===0?'#38e1ff':i%3===1?'#a78bfa':'#4c7dff'}" style="animation-delay:${(i*0.33)%2.6}s"/>`;
  });
  return `<svg class="neural" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#38e1ff"/><stop offset="1" stop-color="#a78bfa"/>
      </linearGradient>
      <radialGradient id="coreGlow" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0" stop-color="#38e1ff" stop-opacity="0.55"/>
        <stop offset="0.6" stop-color="#a78bfa" stop-opacity="0.18"/>
        <stop offset="1" stop-color="transparent" stop-opacity="0"/>
      </radialGradient>
      <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
        <path d="M36 0H0V36" fill="none" stroke="rgba(255,255,255,0.045)" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="${W}" height="${H}" fill="url(#grid)"/>
    <circle cx="${W*0.72}" cy="${H*0.45}" r="150" fill="url(#coreGlow)"/>
    ${links}${circles}
    <circle cx="${W*0.72}" cy="${H*0.45}" r="9" fill="#38e1ff" opacity="0.9"/>
    <circle cx="${W*0.72}" cy="${H*0.45}" r="16" fill="none" stroke="#38e1ff" stroke-width="1" opacity="0.45"/>
    <circle cx="${W*0.72}" cy="${H*0.45}" r="26" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.25"/>
  </svg>`;
}

// ───────────── 렌더링 ─────────────
function filtered() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  return DATA.items.filter(it =>
    (catFilter === "all" || it.cat === catFilter) &&
    (impFilter === "all" || it.imp === impFilter) &&
    (!q || (it.title + it.summary + it.source).toLowerCase().includes(q))
  );
}

function render() {
  document.getElementById("dateLabel").textContent = DATA.date;

  // 히어로 (전체 데이터 기준 첫 '상')
  const hero = DATA.items.find(i => i.imp === "상") || DATA.items[0];
  if (hero) {
    const hc = CATEGORIES.find(c => c.key === hero.cat) || CATEGORIES[0];
    document.getElementById("hero").innerHTML = neuralSVG() + `
      <div class="hero-overlay">
        <div class="hero-kicker">
          <span class="hero-badge">TOP STORY</span>
          <span class="hero-cat" style="color:${hc.color}">● ${hc.label}</span>
        </div>
        <div class="hero-title">${hero.title}</div>
        <div class="hero-why">${hero.insight}</div>
        <div class="hero-bar">
          <span>📅 <b>${hero.date}</b></span>
          <span>${hero.source}</span>
          <span>📖 ${readTime(hero)}</span>
          <a href="${hero.url}" target="_blank" onclick="event.stopPropagation()">원문 읽기 →</a>
        </div>
      </div>`;
    document.getElementById("hero").onclick = () => window.open(hero.url, "_blank");
  }

  // 카테고리 아이콘 행
  document.getElementById("catRow").innerHTML = CATEGORIES.map(c => {
    const n = c.key === "all" ? DATA.items.length : DATA.items.filter(i => i.cat === c.key).length;
    return `<div class="cat-btn ${catFilter === c.key ? "active" : ""}" style="--glow:${c.color}" onclick="setCat('${c.key}')">
      <div class="cat-ic">${c.icon}</div>
      <div class="cat-name">${c.label}</div>
      <div class="cat-cnt">${n}건</div>
    </div>`;
  }).join("");

  // 피드
  const items = filtered();
  const cur = CATEGORIES.find(c => c.key === catFilter);
  document.getElementById("feedTitle").textContent = cur.label;
  document.getElementById("feedSub").textContent = items.length + "건";
  const feed = document.getElementById("feed");
  feed.innerHTML = items.length ? "" : '<div class="empty-msg">조건에 맞는 항목이 없습니다.</div>';
  items.forEach(it => {
    const c = CATEGORIES.find(x => x.key === it.cat);
    const el = document.createElement("div");
    el.className = "item";
    el.innerHTML = `
      <div class="item-row">
        <span class="imp-pill imp-${it.imp}">${it.imp}</span>
        <div class="item-body">
          <div class="item-title">${it.title}<span class="read-time">(${readTime(it)})</span></div>
          <div class="item-meta">
            <span style="color:${c.color};font-weight:700">● ${c.label}</span>
            <span class="src-badge">${it.source}</span>
            <span>${it.date}</span>
            ${it.srcCount > 1 ? `<span class="multi-src">⊕ 출처 ${it.srcCount}곳</span>` : ""}
            ${isTier1(it.source) ? `<span class="tier1">✓ Tier-1</span>` : ""}
          </div>
          <div class="item-detail">
            <div class="item-summary">${it.summary}</div>
            <div class="why-box"><div class="why-label">WHY IT MATTERS</div><div class="why-text">${it.insight}</div></div>
            <a class="item-link" href="${it.url}" target="_blank" onclick="event.stopPropagation()">원문 읽기 →</a>
          </div>
        </div>
        <span class="chev">▶</span>
      </div>`;
    el.onclick = () => el.classList.toggle("open");
    feed.appendChild(el);
  });

  // 우측: 키워드 타일
  document.getElementById("kwGrid").innerHTML = DATA.keywords.map((k, i) => `
    <div class="kw-tile" onclick="document.getElementById('searchInput').value='${k.replace(/\(.+\)/, "").trim().split("·")[0]}';render()">
      <span class="kw-ic">${KW_ICONS[i % KW_ICONS.length]}</span>
      <span class="kw-name">${k}</span>
    </div>`).join("");

  // 우측: 메트릭
  document.getElementById("mTotal").textContent = DATA.items.length;
  document.getElementById("mHigh").textContent = DATA.items.filter(i => i.imp === "상").length;
  document.getElementById("mTier1").textContent = DATA.items.filter(i => isTier1(i.source)).length;

  // 우측: Top 3
  document.getElementById("top3").innerHTML = DATA.items.filter(i => i.imp === "상").slice(0, 3).map((i, idx) => {
    const c = CATEGORIES.find(x => x.key === i.cat);
    return `<div class="queue-card" onclick="window.open('${i.url}','_blank')">
      <div class="q-top"><span class="q-rank">${idx + 1}</span><span class="q-cat" style="color:${c.color}">${c.label}</span></div>
      <div class="q-title">${i.title}</div>
      <div class="q-meta">${i.source} · ${i.date}</div>
    </div>`;
  }).join("");
}

// ───────────── .md 파일 로더 ─────────────
function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = parseDigest(e.target.result, file.name);
      if (parsed.items.length === 0) { alert("카드를 찾지 못했습니다. AX-Maru Daily 형식(.md)인지 확인해 주세요."); return; }
      DATA = parsed; catFilter = "all"; render();
    } catch (err) { alert("파싱 오류: " + err.message); }
  };
  reader.readAsText(file);
}
function parseDigest(text, filename) {
  const dateMatch = text.match(/AX-Maru Daily — (.+)/) || filename.match(/(\d{4}-\d{2}-\d{2})/);
  const kwMatch = text.match(/키워드 Top 5\*{0,2}:\s*(.+)/);
  const keywords = kwMatch ? kwMatch[1].split(/[①②③④⑤]/).map(s => s.trim()).filter(Boolean) : [];
  const items = [];
  const blocks = text.split(/\n## \[/).slice(1);
  blocks.forEach(b => {
    const imp = b.slice(0, b.indexOf("]"));
    const title = b.slice(b.indexOf("]") + 1, b.indexOf("\n")).trim();
    const lines = b.split("\n").filter(l => l.startsWith("- "));
    if (lines.length < 2) return;
    const meta = lines[0].replace(/^- /, "");
    const catText = (meta.split("·")[0] || "").replace("분야:", "").trim();
    const source = (meta.match(/출처:\s*([^·]+)/) || [])[1]?.trim() || "";
    const date = (meta.match(/발행일:\s*([^\s·]+)/) || [])[1]?.trim() || "";
    const url = (meta.match(/\((https?:[^)]+)\)/) || [])[1] || "#";
    const body = lines.slice(1).map(l => l.replace(/^- /, "")).join(" ");
    const [summary, insight] = body.split("💡").map(s => (s || "").replace(/시사점:\s*/, "").trim());
    let cat = "concept";
    for (const c of CATEGORIES) if (c.match && c.match.some(m => catText.includes(m))) { cat = c.key; break; }
    const srcCount = (source.match(/·/g) || []).length + 1 + (source.includes("외") ? 1 : 0);
    items.push({ imp, cat, title, summary: summary || "", insight: insight || "", source, srcCount, date, url });
  });
  return { date: dateMatch ? dateMatch[1] : filename, keywords, items };
}
